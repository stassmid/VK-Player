              @Binding var isPresented: Bool
              var onComplete: (String) -> Void
              
              var body: some View {
                  NavigationView {
                      List(playlists) { playlist in
                          Button {
                              guard let track = track else { return }
                              Task {
                                  await APIService.shared.addToPlaylist(
                                      audioId: track.id,
                                      audioOwnerId: track.owner_id,
                                      playlistId: playlist.id,
                                      playlistOwnerId: playlist.owner_id
                                  )
                                  isPresented = false
                                  onComplete("Добавлено в \(playlist.title)")
                              }
                          } label: {
                              HStack(spacing: 12) {
                                  CoverImageView(urlString: playlist.cover, size: 44)
                                  Text(playlist.title).foregroundColor(.white)
                              }
                          }
                          .listRowBackground(Color(UIColor.secondarySystemBackground))
                      }
                      .listStyle(.insetGrouped)
                      .navigationTitle("В плейлист")
                      .navigationBarTitleDisplayMode(.inline)
                      .toolbar {
                          ToolbarItem(placement: .cancellationAction) {
                              Button("Отмена") { isPresented = false }
                          }
                      }
                  }
              }
          }

          // MARK: - Cover Image

          struct CoverImageView: View {
              let urlString: String
              let size: CGFloat?

              var body: some View {
                  AsyncImage(url: URL(string: urlString)) { phase in
                      switch phase {
                      case .success(let img):
                          img.resizable().aspectRatio(contentMode: .fill)
                      default:
                          Color.gray.opacity(0.2)
                              .overlay(
                                  Image(systemName: "music.note")
                                      .foregroundColor(.gray.opacity(0.5))
                                      .font(.system(size: size != nil ? min(size! * 0.3, 20) : 16))
                              )
                      }
                  }
                  .frame(width: size, height: size)
                  .clipped()
              }
          }

          // MARK: - Equalizer Animation

          struct EqualizerView: View {
              @State private var animating: Bool = false

              private let barsLow: [CGFloat] = [5, 8, 4]
              private let barsHigh: [CGFloat] = [14, 10, 16]

              var body: some View {
                  HStack(spacing: 2) {
                      ForEach(0..<3, id: \.self) { index in
                          RoundedRectangle(cornerRadius: 1.5)
                              .fill(Color.blue)
                              .frame(width: 3, height: animating ? barsHigh[index] : barsLow[index])
                      }
                  }
                  .frame(width: 15, height: 18)
                  .onAppear {
                      withAnimation(
                          Animation.easeInOut(duration: 0.5)
                              .repeatForever(autoreverses: true)
                      ) {
                          animating = true
                      }
                  }
              }
          }
          XEOF

          echo "✅ All source files generated successfully"

      - name: Generate Xcode Project
        run: |
          cd App
          xcodegen generate
          echo "✅ Xcode project generated"

      - name: Compile App
        run: |
          cd App
          xcodebuild \
            -project VKMusicNative.xcodeproj \
            -scheme VKMusicNative \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SYMROOT="$(pwd)/build"

      - name: Create IPA
        run: |
          cd App/build/Release-iphoneos
          mkdir -p Payload
          mv VKMusicNative.app Payload/
          zip -r VKMusicNative.ipa Payload
          echo "✅ IPA created"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VKMusic-Native-App
          path: App/build/Release-iphoneos/VKMusicNative.ipa
