name: Build VK Music iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate App Icon
        run: |
          mkdir -p App/Images.xcassets/AppIcon.appiconset
          cat > App/Images.xcassets/AppIcon.appiconset/Contents.json << 'EOF'
          {
            "images" : [
              { "size" : "20x20", "idiom" : "iphone", "filename" : "icon-40.png", "scale" : "2x" },
              { "size" : "20x20", "idiom" : "iphone", "filename" : "icon-60.png", "scale" : "3x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "icon-58.png", "scale" : "2x" },
              { "size" : "29x29", "idiom" : "iphone", "filename" : "icon-87.png", "scale" : "3x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "icon-80.png", "scale" : "2x" },
              { "size" : "40x40", "idiom" : "iphone", "filename" : "icon-120.png", "scale" : "3x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "icon-120.png", "scale" : "2x" },
              { "size" : "60x60", "idiom" : "iphone", "filename" : "icon-180.png", "scale" : "3x" },
              { "size" : "1024x1024", "idiom" : "ios-marketing", "filename" : "icon-1024.png", "scale" : "1x" }
            ],
            "info" : { "version" : 1, "author" : "xcode" }
          }
          EOF
          
          cat > generate_icon.swift << 'EOF'
          import Foundation
          import CoreGraphics
          import ImageIO
          
          func createIcon(size: CGFloat) -> CGImage? {
              let width = Int(size)
              let height = Int(size)
              let colorSpace = CGColorSpaceCreateDeviceRGB()
              guard let context = CGContext(data: nil, width: width, height: height, bitsPerComponent: 8, bytesPerRow: width * 4, space: colorSpace, bitmapInfo: CGImageAlphaInfo.premultipliedLast.rawValue) else { return nil }
              
              let colors = [CGColor(red: 0.1, green: 0.1, blue: 0.1, alpha: 1.0), CGColor(red: 0.2, green: 0.0, blue: 0.4, alpha: 1.0)] as CFArray
              if let gradient = CGGradient(colorsSpace: colorSpace, colors: colors, locations: [0.0, 1.0]) {
                  context.drawLinearGradient(gradient, start: CGPoint(x: 0, y: 0), end: CGPoint(x: size, y: size), options: [])
              }
              
              return context.makeImage()
          }
          
          let sizes: [CGFloat] = [40, 58, 60, 80, 87, 120, 180, 1024]
          for s in sizes {
              if let img = createIcon(size: s) {
                  let url = URL(fileURLWithPath: "App/Images.xcassets/AppIcon.appiconset/icon-\(Int(s)).png")
                  guard let dest = CGImageDestinationCreateWithURL(url as CFURL, "public.png" as CFString, 1, nil) else { continue }
                  CGImageDestinationAddImage(dest, img, nil)
                  CGImageDestinationFinalize(dest)
              }
          }
          EOF
          swift generate_icon.swift

      - name: Generate Source Files
        run: |
          set -e
          mkdir -p App/Sources

          # ============================================================
          # PROJECT.YML (XcodeGen config)
          # ============================================================
          cat > App/project.yml << 'XEOF'
          name: VKMusicNative
          options:
            bundleIdPrefix: com.stas
            minimumXcodeGenVersion: "2.0"
          settings:
            base:
              SWIFT_VERSION: "5.9"
              IPHONEOS_DEPLOYMENT_TARGET: "15.0"
          targets:
            VKMusicNative:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources: [Sources, Images.xcassets]
              settings:
                base:
                  INFOPLIST_FILE: Info.plist
                  PRODUCT_BUNDLE_IDENTIFIER: com.stas.VKMusicNative
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
              info:
                path: Info.plist
                properties:
                  CFBundleName: "VK Music"
                  CFBundleDisplayName: "VK Music"
                  CFBundleShortVersionString: "2.0"
                  CFBundleVersion: "1"
                  UILaunchStoryboardName: LaunchScreen
                  UIBackgroundModes: [audio]
                  NSAppTransportSecurity:
                    NSAllowsArbitraryLoads: true
                  UISupportedInterfaceOrientations:
                    - UIInterfaceOrientationPortrait
                  UIStatusBarStyle: UIStatusBarStyleLightContent
                  UIViewControllerBasedStatusBarAppearance: false
                  UIApplicationSupportsIndirectInputEvents: true
          XEOF

          # ============================================================
          # 1. APP ENTRY POINT
          # ============================================================
          cat > App/Sources/VKMusicApp.swift << 'XEOF'
          import SwiftUI
          import AVFoundation

          @main
          struct VKMusicApp: App {
              @StateObject private var player = PlayerManager()
              @StateObject private var cache = CacheManager()

              init() {
                  do {
                      try AVAudioSession.sharedInstance().setCategory(
                          .playback,
                          mode: .default,
                          options: [.allowBluetooth, .allowAirPlay]
                      )
                      try AVAudioSession.sharedInstance().setActive(true)
                  } catch {
                      print("AVAudioSession error: \(error)")
                  }
                  let appearance = UITabBarAppearance()
                  appearance.configureWithOpaqueBackground()
                  appearance.backgroundColor = UIColor.black
                  UITabBar.appearance().standardAppearance = appearance
                  if #available(iOS 15.0, *) {
                      UITabBar.appearance().scrollEdgeAppearance = appearance
                  }
              }

              var body: some Scene {
                  WindowGroup {
                      MainView()
                          .environmentObject(player)
                          .environmentObject(cache)
                          .preferredColorScheme(.dark)
                  }
              }
          }
          XEOF

          # ============================================================
          # 2. DATA MODELS
          # ============================================================
          cat > App/Sources/Models.swift << 'XEOF'
          import Foundation

          struct Track: Codable, Identifiable, Equatable, Hashable {
              let id: Int
              let owner_id: Int
              let title: String
              let artist: String
              let url: String
              let cover: String

              var uniqueKey: String {
                  return "\(owner_id)_\(id)"
              }

              static func == (lhs: Track, rhs: Track) -> Bool {
                  return lhs.owner_id == rhs.owner_id && lhs.id == rhs.id
              }

              func hash(into hasher: inout Hasher) {
                  hasher.combine(owner_id)
                  hasher.combine(id)
              }
          }

          struct Playlist: Codable, Identifiable, Hashable {
              let id: Int
              let owner_id: Int
              let title: String
              let cover: String
              let access_key: String
          }

          struct TrackListResponse: Codable {
              let status: String
              let data: [Track]?
          }

          struct PlaylistListResponse: Codable {
              let status: String
              let data: [Playlist]?
          }
          XEOF

          # ============================================================
          # 3. API SERVICE
          # ============================================================
          cat > App/Sources/APIService.swift << 'XEOF'
          import Foundation

          final class APIService {
              static let shared = APIService()
              private init() {}

              private let baseURL = "https://kbgov.kz/12/api.php"

              func fetchMyMusic(offset: Int = 0, count: Int = 100) async throws -> [Track] {
                  let urlString = "\(baseURL)?action=my_music&offset=\(offset)&count=\(count)"
                  guard let url = URL(string: urlString) else { return [] }
                  let (data, _) = try await URLSession.shared.data(from: url)
                  let response = try JSONDecoder().decode(TrackListResponse.self, from: data)
                  return response.data ?? []
              }

              func searchTracks(query: String) async throws -> [Track] {
                  let encoded = query.addingPercentEncoding(withAllowedCharacters: .urlQueryAllowed) ?? ""
                  let urlString = "\(baseURL)?action=search&q=\(encoded)"
                  guard let url = URL(string: urlString) else { return [] }
                  let (data, _) = try await URLSession.shared.data(from: url)
                  let response = try JSONDecoder().decode(TrackListResponse.self, from: data)
                  return response.data ?? []
              }

              func fetchVKMix() async throws -> [Track] {
                  let urlString = "\(baseURL)?action=vkmix"
                  guard let url = URL(string: urlString) else { return [] }
                  let (data, _) = try await URLSession.shared.data(from: url)
                  let response = try JSONDecoder().decode(TrackListResponse.self, from: data)
                  return response.data ?? []
              }

              func fetchPlaylists() async throws -> [Playlist] {
                  let urlString = "\(baseURL)?action=playlists"
                  guard let url = URL(string: urlString) else { return [] }
                  let (data, _) = try await URLSession.shared.data(from: url)
                  let response = try JSONDecoder().decode(PlaylistListResponse.self, from: data)
                  return response.data ?? []
              }

              func fetchPlaylistTracks(albumId: Int, ownerId: Int, accessKey: String = "") async throws -> [Track] {
                  var urlString = "\(baseURL)?action=playlist_tracks&album_id=\(albumId)&owner_id=\(ownerId)"
                  if !accessKey.isEmpty {
                      urlString += "&access_key=\(accessKey)"
                  }
                  guard let url = URL(string: urlString) else { return [] }
                  let (data, _) = try await URLSession.shared.data(from: url)
                  let response = try JSONDecoder().decode(TrackListResponse.self, from: data)
                  return response.data ?? []
              }

              func deleteTrack(id: Int, ownerId: Int) async -> Bool {
                  let urlString = "\(baseURL)?action=delete&id=\(id)&owner_id=\(ownerId)"
                  guard let url = URL(string: urlString) else { return false }
                  do {
                      let (_, response) = try await URLSession.shared.data(from: url)
                      return (response as? HTTPURLResponse)?.statusCode == 200
                  } catch { return false }
              }

              func addTrack(id: Int, ownerId: Int) async -> Bool {
                  let urlString = "\(baseURL)?action=add&id=\(id)&owner_id=\(ownerId)"
                  guard let url = URL(string: urlString) else { return false }
                  do {
                      let (_, response) = try await URLSession.shared.data(from: url)
                      return (response as? HTTPURLResponse)?.statusCode == 200
                  } catch { return false }
              }

              func addToPlaylist(audioId: Int, audioOwnerId: Int, playlistId: Int, playlistOwnerId: Int) async {
                  let urlString = "\(baseURL)?action=add_to_playlist&audio_id=\(audioId)&audio_owner_id=\(audioOwnerId)&playlist_id=\(playlistId)&playlist_owner_id=\(playlistOwnerId)"
                  guard let url = URL(string: urlString) else { return }
                  _ = try? await URLSession.shared.data(from: url)
              }
          }
          XEOF

          # ============================================================
          # 4. CACHE MANAGER
          # ============================================================
          cat > App/Sources/CacheManager.swift << 'XEOF'
          import Foundation
          import UIKit

          final class CacheManager: ObservableObject {
              @Published var cachedIDs: Set<String> = []
              @Published var myMusicIDs: Set<String> = []
              
              @Published var isDownloading: Bool = false
              @Published var progressDone: Int = 0
              @Published var progressTotal: Int = 0

              private let fm = FileManager.default
              private var musicDir: URL {
                  let docs = fm.urls(for: .documentDirectory, in: .userDomainMask)[0]
                  return docs.appendingPathComponent("CachedMusic", isDirectory: true)
              }

              init() {
                  try? fm.createDirectory(at: musicDir, withIntermediateDirectories: true)
                  if let saved = UserDefaults.standard.array(forKey: "cachedIDs") as? [String] {
                      cachedIDs = Set(saved)
                  }
                  if let savedMyMusic = UserDefaults.standard.array(forKey: "myMusicIDs") as? [String] {
                      myMusicIDs = Set(savedMyMusic)
                  }
              }

              private func persistCachedIDs() {
                  UserDefaults.standard.set(Array(cachedIDs), forKey: "cachedIDs")
              }
              
              private func persistMyMusicIDs() {
                  UserDefaults.standard.set(Array(myMusicIDs), forKey: "myMusicIDs")
              }

              func isDownloaded(_ track: Track) -> Bool {
                  return cachedIDs.contains(track.uniqueKey) && fm.fileExists(atPath: localURL(for: track).path)
              }

              func localURL(for track: Track) -> URL {
                  return musicDir.appendingPathComponent("\(track.uniqueKey).mp3")
              }

              func saveTrackMeta(_ track: Track) {
                  var list = loadTracksMeta()
                  if !list.contains(where: { $0.uniqueKey == track.uniqueKey }) {
                      list.append(track)
                      if let encoded = try? JSONEncoder().encode(list) {
                          UserDefaults.standard.set(encoded, forKey: "cachedTracksMeta")
                      }
                  }
              }

              func loadTracksMeta() -> [Track] {
                  guard let data = UserDefaults.standard.data(forKey: "cachedTracksMeta"),
                        let tracks = try? JSONDecoder().decode([Track].self, from: data) else {
                      return []
                  }
                  return tracks
              }

              func saveMyMusicOrder(_ tracks: [Track]) {
                  if let encoded = try? JSONEncoder().encode(tracks) {
                      UserDefaults.standard.set(encoded, forKey: "myMusicOrder")
                  }
                  myMusicIDs = Set(tracks.map { $0.uniqueKey })
                  persistMyMusicIDs()
              }
              
              func addToMyMusic(track: Track) {
                  myMusicIDs.insert(track.uniqueKey)
                  persistMyMusicIDs()
              }
              
              func removeFromMyMusic(track: Track) {
                  myMusicIDs.remove(track.uniqueKey)
                  persistMyMusicIDs()
              }

              func getMyMusicOrder() -> [Track] {
                  guard let data = UserDefaults.standard.data(forKey: "myMusicOrder"),
                        let tracks = try? JSONDecoder().decode([Track].self, from: data) else {
                      return []
                  }
                  return tracks
              }

              func getCachedTracksInOrder() -> [Track] {
                  let order = getMyMusicOrder()
                  if !order.isEmpty {
                      return order.filter { isDownloaded($0) }
                  }
                  return loadTracksMeta().filter { isDownloaded($0) }
              }

              func download(track: Track) async -> Bool {
                  guard !isDownloaded(track) else { return true }
                  guard let remoteURL = URL(string: track.url) else { return false }
                  do {
                      let (tempURL, _) = try await URLSession.shared.download(from: remoteURL)
                      let dest = localURL(for: track)
                      if fm.fileExists(atPath: dest.path) {
                          try fm.removeItem(at: dest)
                      }
                      try fm.moveItem(at: tempURL, to: dest)
                      await MainActor.run {
                          cachedIDs.insert(track.uniqueKey)
                          persistCachedIDs()
                          saveTrackMeta(track)
                      }
                      return true
                  } catch {
                      print("Download error: \(error)")
                      return false
                  }
              }

              func syncNewTracks(from tracks: [Track]) async -> Int {
                  let toDownload = tracks.filter { !isDownloaded($0) }
                  guard !toDownload.isEmpty else { return 0 }

                  await MainActor.run {
                      isDownloading = true
                      progressDone = 0
                      progressTotal = toDownload.count
                  }

                  var downloaded = 0
                  for (index, track) in toDownload.enumerated() {
                      let ok = await download(track: track)
                      if ok { downloaded += 1 }
                      await MainActor.run { progressDone = index + 1 }
                  }

                  await MainActor.run { isDownloading = false }
                  return downloaded
              }

              func downloadAllMyMusic() async -> Int {
                  await MainActor.run {
                      isDownloading = true
                      progressDone = 0
                      progressTotal = 0
                  }

                  var allTracks: [Track] = []
                  var offset = 0
                  let batchSize = 200

                  while true {
                      guard let batch = try? await APIService.shared.fetchMyMusic(offset: offset, count: batchSize) else { break }
                      if batch.isEmpty { break }
                      
                      // Filter out duplicates safely
                      let newTracks = batch.filter { t in !allTracks.contains(where: { $0.uniqueKey == t.uniqueKey }) }
                      allTracks.append(contentsOf: newTracks)
                      
                      // ALWAYS increment by requested batch size (200), not the received count, to fix VK API block skips
                      offset += batchSize
                  }

                  await MainActor.run {
                      saveMyMusicOrder(allTracks)
                      progressTotal = allTracks.count
                  }

                  var downloaded = 0
                  for (index, track) in allTracks.enumerated() {
                      let ok = await download(track: track)
                      if ok { downloaded += 1 }
                      await MainActor.run { progressDone = index + 1 }
                  }

                  await MainActor.run { isDownloading = false }
                  return downloaded
              }

              func deleteCache(for track: Track) {
                  try? fm.removeItem(at: localURL(for: track))
                  cachedIDs.remove(track.uniqueKey)
                  persistCachedIDs()
                  var meta = loadTracksMeta()
                  meta.removeAll { $0.uniqueKey == track.uniqueKey }
                  if let encoded = try? JSONEncoder().encode(meta) {
                      UserDefaults.standard.set(encoded, forKey: "cachedTracksMeta")
                  }
              }

              func clearAllCache() {
                  try? fm.removeItem(at: musicDir)
                  try? fm.createDirectory(at: musicDir, withIntermediateDirectories: true)
                  cachedIDs.removeAll()
                  persistCachedIDs()
                  UserDefaults.standard.removeObject(forKey: "cachedTracksMeta")
              }
          }
          XEOF

          # ============================================================
          # 5. PLAYER MANAGER
          # ============================================================
          cat > App/Sources/PlayerManager.swift << 'XEOF'
          import Foundation
          import AVFoundation
          import MediaPlayer
          import UIKit

          final class PlayerManager: ObservableObject {
              @Published var currentTrack: Track?
              @Published var isPlaying: Bool = false
              @Published var currentTime: Double = 0
              @Published var duration: Double = 0
              @Published var playMode: PlayMode = .normal
              @Published var recentlyPlayed: [Track] = []
              @Published var searchHistory: [String] = []
              @Published var isVKMixPlaying: Bool = false

              enum PlayMode: Int {
                  case normal = 0
                  case shuffle = 1
                  case repeatOne = 2
              }

              var queue: [Track] = []
              private var originalQueue: [Track] = []
              var currentIndex: Int = 0
              private var avPlayer: AVPlayer?
              private var timeObserverToken: Any?
              private var endObserver: NSObjectProtocol?
              private var commandsRegistered: Bool = false

              init() {
                  loadRecentlyPlayed()
                  loadSearchHistory()
                  registerRemoteCommands()
              }

              func play(track: Track, in tracks: [Track], isVKMix: Bool = false) {
                  if track == currentTrack && queue == tracks {
                      togglePlay()
                      return
                  }
                  
                  isVKMixPlaying = isVKMix
                  removeObservers()
                  originalQueue = tracks

                  if playMode == .shuffle {
                      queue = tracks.shuffled()
                      if let idx = queue.firstIndex(of: track) {
                          queue.swapAt(0, idx)
                      }
                      currentIndex = 0
                  } else {
                      queue = tracks
                      currentIndex = tracks.firstIndex(of: track) ?? 0
                  }

                  beginPlayback()
              }

              func playAtIndex(_ index: Int) {
                  guard index >= 0, index < queue.count else { return }
                  removeObservers()
                  currentIndex = index
                  beginPlayback()
              }

              func togglePlay() {
                  guard let p = avPlayer else { return }
                  if isPlaying {
                      p.pause()
                  } else {
                      try? AVAudioSession.sharedInstance().setActive(true)
                      p.play()
                  }
                  isPlaying.toggle()
                  syncNowPlayingTime()
              }

              func nextTrack() {
                  guard !queue.isEmpty else { return }
                  if playMode == .repeatOne {
                      avPlayer?.seek(to: .zero)
                      try? AVAudioSession.sharedInstance().setActive(true)
                      avPlayer?.play()
                      isPlaying = true
                      return
                  }
                  removeObservers()
                  currentIndex = (currentIndex + 1) % queue.count
                  beginPlayback()
              }

              func prevTrack() {
                  guard !queue.isEmpty else { return }
                  removeObservers()
                  currentIndex = currentIndex > 0 ? currentIndex - 1 : queue.count - 1
                  beginPlayback()
              }

              func seek(to fraction: Double) {
                  guard let p = avPlayer, duration > 0 else { return }
                  let target = CMTime(seconds: fraction * duration, preferredTimescale: 600)
                  p.seek(to: target)
              }

              func cyclePlayMode() {
                  switch playMode {
                  case .normal:
                      playMode = .shuffle
                      let current = currentTrack
                      queue = originalQueue.shuffled()
                      if let t = current, let idx = queue.firstIndex(of: t) {
                          queue.swapAt(0, idx)
                          currentIndex = 0
                      }
                  case .shuffle:
                      playMode = .repeatOne
                  case .repeatOne:
                      playMode = .normal
                      queue = originalQueue
                      if let t = currentTrack {
                          currentIndex = queue.firstIndex(of: t) ?? 0
                      }
                  }
              }

              private func beginPlayback() {
                  guard currentIndex >= 0, currentIndex < queue.count else { return }
                  let track = queue[currentIndex]
                  currentTrack = track
                  currentTime = 0
                  duration = 0

                  let docsDir = FileManager.default.urls(for: .documentDirectory, in: .userDomainMask)[0].appendingPathComponent("CachedMusic")
                  let localFile = docsDir.appendingPathComponent("\(track.uniqueKey).mp3")

                  let playURL: URL
                  if FileManager.default.fileExists(atPath: localFile.path) {
                      playURL = localFile
                  } else {
                      guard let remote = URL(string: track.url) else { return }
                      playURL = remote
                  }

                  do {
                      try AVAudioSession.sharedInstance().setCategory(.playback, mode: .default, options: [.allowBluetooth, .allowAirPlay])
                      try AVAudioSession.sharedInstance().setActive(true)
                  } catch {
                      print("Audio session error: \(error)")
                  }

                  let playerItem = AVPlayerItem(url: playURL)
                  avPlayer = AVPlayer(playerItem: playerItem)
                  avPlayer?.play()
                  isPlaying = true

                  timeObserverToken = avPlayer?.addPeriodicTimeObserver(
                      forInterval: CMTime(seconds: 0.5, preferredTimescale: 600),
                      queue: .main
                  ) { [weak self] time in
                      guard let self = self else { return }
                      let secs = time.seconds
                      self.currentTime = secs.isNaN ? 0 : secs
                      if let dur = self.avPlayer?.currentItem?.duration.seconds, !dur.isNaN {
                          self.duration = dur
                      }
                      self.syncNowPlayingTime()
                  }

                  endObserver = NotificationCenter.default.addObserver(
                      forName: .AVPlayerItemDidPlayToEndTime,
                      object: playerItem,
                      queue: .main
                  ) { [weak self] _ in
                      self?.handleTrackEnd()
                  }

                  addToRecentlyPlayed(track)
                  updateNowPlayingInfo()
              }

              private func handleTrackEnd() {
                  if playMode == .repeatOne {
                      avPlayer?.seek(to: .zero)
                      try? AVAudioSession.sharedInstance().setActive(true)
                      avPlayer?.play()
                  } else {
                      removeObservers()
                      currentIndex = (currentIndex + 1) % queue.count
                      beginPlayback()
                  }
              }

              private func removeObservers() {
                  if let token = timeObserverToken {
                      avPlayer?.removeTimeObserver(token)
                      timeObserverToken = nil
                  }
                  if let obs = endObserver {
                      NotificationCenter.default.removeObserver(obs)
                      endObserver = nil
                  }
              }

              private func registerRemoteCommands() {
                  guard !commandsRegistered else { return }
                  commandsRegistered = true

                  let center = MPRemoteCommandCenter.shared()

                  center.playCommand.isEnabled = true
                  center.playCommand.addTarget { [weak self] _ in
                      try? AVAudioSession.sharedInstance().setActive(true)
                      self?.avPlayer?.play()
                      DispatchQueue.main.async { self?.isPlaying = true }
                      return .success
                  }

                  center.pauseCommand.isEnabled = true
                  center.pauseCommand.addTarget { [weak self] _ in
                      self?.avPlayer?.pause()
                      DispatchQueue.main.async { self?.isPlaying = false }
                      return .success
                  }

                  center.togglePlayPauseCommand.isEnabled = true
                  center.togglePlayPauseCommand.addTarget { [weak self] _ in
                      DispatchQueue.main.async { self?.togglePlay() }
                      return .success
                  }

                  center.nextTrackCommand.isEnabled = true
                  center.nextTrackCommand.addTarget { [weak self] _ in
                      DispatchQueue.main.async { self?.nextTrack() }
                      return .success
                  }

                  center.previousTrackCommand.isEnabled = true
                  center.previousTrackCommand.addTarget { [weak self] _ in
                      DispatchQueue.main.async { self?.prevTrack() }
                      return .success
                  }

                  center.changePlaybackPositionCommand.isEnabled = true
                  center.changePlaybackPositionCommand.addTarget { [weak self] event in
                      guard let posEvent = event as? MPChangePlaybackPositionCommandEvent else {
                          return .commandFailed
                      }
                      let time = CMTime(seconds: posEvent.positionTime, preferredTimescale: 600)
                      self?.avPlayer?.seek(to: time)
                      return .success
                  }
              }

              private func updateNowPlayingInfo() {
                  guard let track = currentTrack else { return }
                  var info: [String: Any] = [
                      MPMediaItemPropertyTitle: track.title,
                      MPMediaItemPropertyArtist: track.artist,
                      MPNowPlayingInfoPropertyPlaybackRate: NSNumber(value: 1.0)
                  ]
                  if duration > 0 {
                      info[MPMediaItemPropertyPlaybackDuration] = NSNumber(value: duration)
                      info[MPNowPlayingInfoPropertyElapsedPlaybackTime] = NSNumber(value: currentTime)
                  }
                  MPNowPlayingInfoCenter.default().nowPlayingInfo = info

                  if let coverURL = URL(string: track.cover) {
                      URLSession.shared.dataTask(with: coverURL) { data, _, _ in
                          guard let imgData = data, let image = UIImage(data: imgData) else { return }
                          let artwork = MPMediaItemArtwork(boundsSize: image.size) { _ in image }
                          DispatchQueue.main.async {
                              var nowInfo = MPNowPlayingInfoCenter.default().nowPlayingInfo ?? [:]
                              nowInfo[MPMediaItemPropertyArtwork] = artwork
                              MPNowPlayingInfoCenter.default().nowPlayingInfo = nowInfo
                          }
                      }.resume()
                  }
              }

              private func syncNowPlayingTime() {
                  var info = MPNowPlayingInfoCenter.default().nowPlayingInfo ?? [:]
                  info[MPNowPlayingInfoPropertyElapsedPlaybackTime] = NSNumber(value: currentTime)
                  info[MPMediaItemPropertyPlaybackDuration] = NSNumber(value: duration)
                  info[MPNowPlayingInfoPropertyPlaybackRate] = NSNumber(value: isPlaying ? 1.0 : 0.0)
                  MPNowPlayingInfoCenter.default().nowPlayingInfo = info
              }

              func addToRecentlyPlayed(_ track: Track) {
                  recentlyPlayed.removeAll { $0.uniqueKey == track.uniqueKey }
                  recentlyPlayed.insert(track, at: 0)
                  if recentlyPlayed.count > 50 {
                      recentlyPlayed = Array(recentlyPlayed.prefix(50))
                  }
                  if let encoded = try? JSONEncoder().encode(recentlyPlayed) {
                      UserDefaults.standard.set(encoded, forKey: "recentlyPlayed")
                  }
              }

              private func loadRecentlyPlayed() {
                  guard let data = UserDefaults.standard.data(forKey: "recentlyPlayed"),
                        let tracks = try? JSONDecoder().decode([Track].self, from: data) else { return }
                  recentlyPlayed = tracks
              }

              func addSearchQuery(_ query: String) {
                  let q = query.trimmingCharacters(in: .whitespaces)
                  guard !q.isEmpty else { return }
                  searchHistory.removeAll { $0 == q }
                  searchHistory.insert(q, at: 0)
                  if searchHistory.count > 20 {
                      searchHistory = Array(searchHistory.prefix(20))
                  }
                  UserDefaults.standard.set(searchHistory, forKey: "searchHistory")
              }

              func removeSearchQuery(_ query: String) {
                  searchHistory.removeAll { $0 == query }
                  UserDefaults.standard.set(searchHistory, forKey: "searchHistory")
              }

              private func loadSearchHistory() {
                  searchHistory = UserDefaults.standard.stringArray(forKey: "searchHistory") ?? []
              }
          }
