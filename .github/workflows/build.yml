          # ============================================================
          # 12. FULL PLAYER VIEW
          # ============================================================
          cat > App/Sources/FullPlayerView.swift << 'XEOF'
          import SwiftUI
          import UIKit

          struct FullPlayerView: View {
              @EnvironmentObject var player: PlayerManager
              @EnvironmentObject var cache: CacheManager
              @Environment(\.dismiss) private var dismiss
              @State private var dragOffset: CGFloat = 0
              @State private var seekValue: Double = 0
              @State private var isSeeking: Bool = false
              @State private var showPlaylistPicker: Bool = false
              @State private var playlists: [Playlist] = []

              var body: some View {
                  ZStack {
                      Color.black.ignoresSafeArea()

                      if let track = player.currentTrack {
                          VStack(spacing: 0) {
                              // Drag handle
                              Capsule()
                                  .fill(Color.gray.opacity(0.5))
                                  .frame(width: 40, height: 5)
                                  .padding(.top, 12)
                                  .padding(.bottom, 6)

                              // Header
                              HStack {
                                  Button { dismiss() } label: {
                                      Image(systemName: "chevron.down")
                                          .font(.system(size: 18, weight: .semibold))
                                          .foregroundColor(.gray)
                                          .frame(width: 44, height: 44)
                                  }
                                  Spacer()
                                  Text(player.isVKMixPlaying ? "VK МИКС" : "СЕЙЧАС ИГРАЕТ")
                                      .font(.system(size: 12, weight: .bold))
                                      .foregroundColor(player.isVKMixPlaying ? .purple : .gray)
                                      .tracking(1.5)
                                  Spacer()
                                  Color.clear.frame(width: 44, height: 44)
                              }
                              .padding(.horizontal, 16)

                              Spacer()

                              // Cover art
                              let screenW = UIScreen.main.bounds.width
                              AsyncImage(url: URL(string: track.cover)) { phase in
                                  switch phase {
                                  case .success(let img):
                                      img.resizable().aspectRatio(contentMode: .fill)
                                  default:
                                      Color.gray.opacity(0.2)
                                          .overlay(
                                              Image(systemName: "music.note")
                                                  .font(.system(size: 50))
                                                  .foregroundColor(.gray)
                                          )
                                  }
                              }
                              .frame(width: screenW - 60, height: screenW - 60)
                              .clipped()
                              .cornerRadius(16)
                              .shadow(color: .black.opacity(0.5), radius: 20, y: 10)
                              .scaleEffect(player.isPlaying ? 1.0 : 0.85)
                              .animation(.spring(response: 0.5, dampingFraction: 0.7), value: player.isPlaying)

                              Spacer()

                              // Track info + actions
                              HStack(alignment: .center) {
                                  VStack(alignment: .leading, spacing: 6) {
                                      Text(track.title)
                                          .font(.system(size: 22, weight: .bold))
                                          .lineLimit(1)
                                      Text(track.artist)
                                          .font(.system(size: 17))
                                          .foregroundColor(.gray)
                                          .lineLimit(1)
                                  }
                                  Spacer()
                                  
                                  HStack(spacing: 20) {
                                      // Plus (Add to playlist)
                                      Button(action: {
                                          Task {
                                              playlists = (try? await APIService.shared.fetchPlaylists()) ?? []
                                              showPlaylistPicker = true
                                          }
                                      }) {
                                          Image(systemName: "plus.circle")
                                              .font(.system(size: 24))
                                              .foregroundColor(.gray)
                                      }
                                      
                                      // Heart (Add/Remove from My Music)
                                      let isAdded = cache.myMusicIDs.contains(track.uniqueKey)
                                      Button(action: { toggleLike(for: track, isAdded: isAdded) }) {
                                          Image(systemName: isAdded ? "heart.fill" : "heart")
                                              .font(.system(size: 24))
                                              .foregroundColor(isAdded ? .white : .gray)
                                      }
                                  }
                              }
                              .padding(.horizontal, 30)
                              .padding(.bottom, 20)

                              // Progress slider
                              VStack(spacing: 8) {
                                  Slider(
                                      value: Binding<Double>(
                                          get: {
                                              if isSeeking { return seekValue }
                                              if player.duration > 0 { return player.currentTime / player.duration }
                                              return 0
                                          },
                                          set: { val in
                                              isSeeking = true
                                              seekValue = val
                                          }
                                      ),
                                      in: 0...1,
                                      onEditingChanged: { editing in
                                          if !editing {
                                              player.seek(to: seekValue)
                                              isSeeking = false
                                          }
                                      }
                                  )
                                  .accentColor(.white)

                                  HStack {
                                      Text(formatTime(player.currentTime))
                                          .font(.system(size: 12, design: .monospaced))
                                          .foregroundColor(.gray)
                                      Spacer()
                                      Text(formatTime(player.duration))
                                          .font(.system(size: 12, design: .monospaced))
                                          .foregroundColor(.gray)
                                  }
                              }
                              .padding(.horizontal, 30)
                              .padding(.bottom, 20)

                              // Controls
                              HStack(spacing: 0) {
                                  Button { player.cyclePlayMode() } label: {
                                      Image(systemName: playModeIcon)
                                          .font(.system(size: 20))
                                          .foregroundColor(player.playMode == .normal ? .gray : .blue)
                                          .frame(width: 44, height: 44)
                                  }

                                  Spacer()

                                  Button { player.prevTrack() } label: {
                                      Image(systemName: "backward.fill")
                                          .font(.system(size: 30))
                                          .foregroundColor(.white)
                                          .frame(width: 50, height: 50)
                                  }

                                  Button { player.togglePlay() } label: {
                                      Image(systemName: player.isPlaying ? "pause.circle.fill" : "play.circle.fill")
                                          .font(.system(size: 65))
                                          .foregroundColor(.white)
                                          .frame(width: 75, height: 75)
                                  }
                                  .padding(.horizontal, 20)

                                  Button { player.nextTrack() } label: {
                                      Image(systemName: "forward.fill")
                                          .font(.system(size: 30))
                                          .foregroundColor(.white)
                                          .frame(width: 50, height: 50)
                                  }

                                  Spacer()

                                  Color.clear.frame(width: 44, height: 44)
                              }
                              .padding(.horizontal, 20)
                              .padding(.bottom, 40)
                          }
                      }
                  }
                  .offset(y: dragOffset)
                  .gesture(
                      DragGesture(minimumDistance: 30)
                          .onChanged { value in
                              if value.translation.height > 0 {
                                  dragOffset = value.translation.height
                              }
                          }
                          .onEnded { value in
                              if value.translation.height > 150 || value.predictedEndTranslation.height > 400 {
                                  dismiss()
                              } else {
                                  withAnimation(.spring(response: 0.3, dampingFraction: 0.86)) {
                                      dragOffset = 0
                                  }
                              }
                          }
                  )
                  .animation(.interactiveSpring(), value: dragOffset)
                  .sheet(isPresented: $showPlaylistPicker) {
                      PlaylistPickerSheet(track: player.currentTrack, playlists: $playlists, isPresented: $showPlaylistPicker, onComplete: { _ in })
                  }
              }

              private var playModeIcon: String {
                  switch player.playMode {
                  case .normal: return "list.bullet"
                  case .shuffle: return "shuffle"
                  case .repeatOne: return "repeat.1"
                  }
              }
              
              private func toggleLike(for track: Track, isAdded: Bool) {
                  Task {
                      if isAdded {
                          let success = await APIService.shared.deleteTrack(id: track.id, ownerId: track.owner_id)
                          if success { cache.removeFromMyMusic(track: track) }
                      } else {
                          let success = await APIService.shared.addTrack(id: track.id, ownerId: track.owner_id)
                          if success { cache.addToMyMusic(track: track) }
                      }
                  }
              }

              private func formatTime(_ seconds: Double) -> String {
                  guard !seconds.isNaN, seconds >= 0 else { return "0:00" }
                  let m = Int(seconds) / 60
                  let s = Int(seconds) % 60
                  return "\(m):\(String(format: "%02d", s))"
              }
          }
          XEOF

