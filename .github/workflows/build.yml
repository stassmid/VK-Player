                              .font(.system(size: 22, weight: .bold))
                              .padding(.horizontal, 16)
                              .padding(.top, 8)

                          if playlists.isEmpty && isLoading {
                              ProgressView().frame(maxWidth: .infinity).padding(40)
                          } else {
                              LazyVGrid(columns: columns, spacing: 16) {
                                  ForEach(playlists) { playlist in
                                      Button { openPlaylist(playlist) } label: {
                                          VStack(spacing: 6) {
                                              CoverImageView(urlString: playlist.cover, size: nil)
                                                  .aspectRatio(1, contentMode: .fit)
                                                  .cornerRadius(10)

                                              Text(playlist.title)
                                                  .font(.system(size: 12, weight: .medium))
                                                  .foregroundColor(.white)
                                                  .lineLimit(2)
                                                  .multilineTextAlignment(.center)
                                          }
                                      }
                                  }
                              }
                              .padding(.horizontal, 16)
                          }
                      }
                      .padding(.bottom, 20)
                  }
              }

              private var playlistTracksView: some View {
                  VStack(alignment: .leading, spacing: 0) {
                      HStack {
                          Button {
                              showTracks = false
                              playlistTracks = []
                          } label: {
                              HStack(spacing: 4) {
                                  Image(systemName: "chevron.left")
                                  Text("Назад")
                              }
                              .foregroundColor(.blue)
                          }
                          Spacer()
                          Text(selectedPlaylist?.title ?? "")
                              .font(.system(size: 16, weight: .bold))
                              .lineLimit(1)
                          Spacer()
                          Color.clear.frame(width: 60)
                      }
                      .padding(.horizontal, 16)
                      .padding(.vertical, 10)

                      if isLoading {
                          ProgressView().frame(maxWidth: .infinity).padding(30)
                      } else {
                          ScrollView {
                              LazyVStack(spacing: 0) {
                                  ForEach(Array(playlistTracks.enumerated()), id: \.element.uniqueKey) { _, track in
                                      TrackRow(
                                          track: track,
                                          isPlaying: player.currentTrack == track && player.isPlaying,
                                          isCached: cache.isDownloaded(track)
                                      )
                                      .contentShape(Rectangle())
                                      .onTapGesture {
                                          player.play(track: track, in: playlistTracks)
                                      }
                                      Divider().background(Color.gray.opacity(0.2))
                                  }
                              }
                              .padding(.horizontal, 16)
                          }
                      }
                  }
              }

              private func loadPlaylists() async {
                  guard playlists.isEmpty else { return }
                  isLoading = true
                  playlists = (try? await APIService.shared.fetchPlaylists()) ?? []
                  isLoading = false
              }

              private func openPlaylist(_ pl: Playlist) {
                  selectedPlaylist = pl
                  showTracks = true
                  isLoading = true
                  Task {
                      playlistTracks = (try? await APIService.shared.fetchPlaylistTracks(
                          albumId: pl.id, ownerId: pl.owner_id, accessKey: pl.access_key
                      )) ?? []
                      isLoading = false
                  }
              }
          }
          XEOF

