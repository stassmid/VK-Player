                      Task {
                          let ok = await cache.download(track: track)
                          showToast(ok ? "Трек скачан" : "Ошибка загрузки")
                      }
                  } label: {
                      Label("Кешировать трек", systemImage: "arrow.down.circle")
                  }

                  Button {
                      Task {
                          let count = await cache.downloadAllMyMusic()
                          showToast("Скачано: \(count)")
                      }
                  } label: {
                      Label("Кешировать ВСЕ треки", systemImage: "arrow.down.circle.fill")
                  }

                  Button {
                      trackForPlaylist = track
                      Task {
                          playlists = (try? await APIService.shared.fetchPlaylists()) ?? []
                          showPlaylistPicker = true
                      }
                  } label: {
                      Label("Добавить в плейлист", systemImage: "text.badge.plus")
                  }

                  Divider()

                  Button(role: .destructive) {
                      Task {
                          let ok = await APIService.shared.deleteTrack(id: track.id, ownerId: track.owner_id)
                          if ok {
                              tracks.removeAll { $0 == track }
                              cache.removeFromMyMusic(track: track)
                              showToast("Трек удален")
                          } else {
                              showToast("Ошибка удаления")
                          }
                      }
                  } label: {
                      Label("Удалить", systemImage: "trash")
                  }
              }

              // MARK: - FIXED PAGINATION (Load Loading)

              private func loadInitialTracks() async {
                  guard tracks.isEmpty else { return }
                  isLoading = true
                  do {
                      let result = try await APIService.shared.fetchMyMusic(offset: 0, count: 200)
                      tracks = result
                      // ALWAYS INCREMENT BY 200, REGARDLESS OF RECEIVED COUNT!
                      loadOffset = 200
                      // CONTINUE IF ARRAY IS NOT COMPLETELY EMPTY
                      hasMore = !result.isEmpty
                      cache.saveMyMusicOrder(result)
                  } catch {
                      print("Load error: \(error)")
                  }
                  isLoading = false
              }

              private func loadMoreTracks() async {
                  guard !isLoading, hasMore else { return }
                  isLoading = true
                  do {
                      let result = try await APIService.shared.fetchMyMusic(offset: loadOffset, count: 200)
                      // Filter duplicates just in case
                      let newTracks = result.filter { newTrack in !tracks.contains(where: { $0.uniqueKey == newTrack.uniqueKey }) }
                      tracks.append(contentsOf: newTracks)
                      
                      loadOffset += 200
                      hasMore = !result.isEmpty
                      cache.saveMyMusicOrder(tracks)
                  } catch {
                      print("Load more error: \(error)")
                  }
                  isLoading = false
              }

              private func syncCachedTracks() async {
                  let tracksToSync = tracks
                  let count = await cache.syncNewTracks(from: tracksToSync)
                  showToast(count > 0 ? "Скачано: \(count)" : "Всё актуально")
              }

              private func shuffleCachedTracks() {
                  let cached = cache.getCachedTracksInOrder().shuffled()
                  guard let first = cached.first else { return }
                  player.play(track: first, in: cached)
              }

              private func showToast(_ msg: String) {
                  withAnimation { toastMessage = msg }
                  DispatchQueue.main.asyncAfter(deadline: .now() + 2.5) {
                      withAnimation { toastMessage = nil }
                  }
              }

              @ViewBuilder
              private var toastOverlay: some View {
                  if let msg = toastMessage {
                      Text(msg)
                          .font(.system(size: 14, weight: .semibold))
                          .foregroundColor(.white)
                          .padding(.horizontal, 20)
                          .padding(.vertical, 12)
                          .background(Color(UIColor.secondarySystemBackground).opacity(0.95))
                          .cornerRadius(20)
                          .shadow(color: .black.opacity(0.3), radius: 10)
                          .padding(.top, 10)
                          .transition(.move(edge: .top).combined(with: .opacity))
                  }
              }
          }
